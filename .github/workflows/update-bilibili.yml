name: Update Bilibili Plugin

on:
  schedule:
    # 10:30 Beijing time every day
    - cron: "30 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update Bilibili plugin from upstream
        shell: pwsh
        run: ./tools/update-bilibili.ps1

      - name: Commit changes
        shell: bash
        run: |
          if git diff --quiet -- Plugins/bilibili.lpx; then
            echo "No Bilibili plugin changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Plugins/bilibili.lpx
          git commit -m "chore: update bilibili plugin from upstream"
          git push
