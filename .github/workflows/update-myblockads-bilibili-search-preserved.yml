name: Update MyBlockAds Bilibili Search Preserved Plugin

on:
  workflow_dispatch:
  schedule:
    - cron: "35 */6 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Loon plugin from upstream
        shell: python
        run: |
          from pathlib import Path
          from urllib.request import urlopen

          upstream = "https://rucu6.pages.dev/Plugins/myblockads.lpx"
          output = Path("Plugins/myblockads-bilibili-search-preserved.lpx")
          output.parent.mkdir(parents=True, exist_ok=True)

          text = urlopen(upstream, timeout=60).read().decode("utf-8")
          lines = text.splitlines()
          patched = []

          for line in lines:
              if line.startswith("#!name="):
                  patched.append("#!name=MyBlockAds - ?????????????")
                  continue
              if line.startswith("#!desc="):
                  patched.append("#!desc=???? RuCu6 ? MyBlockAds Loon ????????????????/????????????????? YouTube ???")
                  continue

              if (
                  "v2\/search\/square" in line
                  and "bilibili" in line.lower()
                  and not line.lstrip().startswith("#")
              ):
                  preserved = line.replace("|v2\/search\/square", "").replace("v2\/search\/square|", "")
                  patched.append("# ????????/???????? v2/search/square ??")
                  patched.append("# " + line)
                  if preserved != line:
                      patched.append(preserved)
                  continue

              if (
                  "Search\/DefaultWords" in line
                  and "bili" in line.lower()
                  and not line.lstrip().startswith("#")
              ):
                  patched.append("# ???????????")
                  patched.append("# " + line)
                  continue

              if "youtubei.googleapis.com" in line or "*.googlevideo.com" in line:
                  line = line.replace(", youtubei.googleapis.com", "").replace(", *.googlevideo.com", "")

              if any(
                  marker in line
                  for marker in (
                      "# > YouTube",
                      "rr*.googlevideo.com",
                      "googlevideo",
                      "youtubei\.googleapis\.com",
                      "youtube.response.js",
                      "YouTube???",
                  )
              ):
                  continue

              patched.append(line)

          output.write_text("
".join(patched) + "
", encoding="utf-8")

      - name: Commit changes
        shell: bash
        run: |
          if git diff --quiet -- Plugins/myblockads-bilibili-search-preserved.lpx; then
            echo "No changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Plugins/myblockads-bilibili-search-preserved.lpx
          git commit -m "Sync MyBlockAds plugin with Bilibili search preserved"
          git push
